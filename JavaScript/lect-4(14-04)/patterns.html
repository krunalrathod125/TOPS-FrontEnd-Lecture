<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Patterns Example</title>
</head>
<body>
    
    <Script>
        // 
        document.write("Example of a simple pattern: Printing a cube of * <br><br>");
        

        for (let i=1; i <= 5; i++) {
            for (let j=1; j <= 5; j++) {
                document.write("* ");   
            }
            document.write("<br>");
        }

        document.write("<br><br>Example of a simple pattern: Printing a right-angled triangle of * <br><br>");

        for (let i=1; i <= 5; i++) {
            for (let j=1; j <= i; j++) {
                document.write("* ");
            }
            document.write("<br>");
        }

        document.write("<br><br>Example of a simple pattern: Printing a right-angled triangle of * in reverse order <br><br>");

        for (let i=5; i >= 1; i--) {
            
            for (let j=1; j <= i; j++) {
                document.write("* ");
            }
            document.write("<br>");
        }

        document.write("<br><br>Example of a simple pattern: Printing a left-angled triangle of * <br><br>");

        for (let i=1; i <= 5; i++) {
            for (let j=1; j <= 5 - i; j++) {
                document.write("&nbsp;&nbsp;&nbsp;");
            }
            for (let k=1; k <= i; k++) {
                document.write("* ");
            }
            document.write("<br>");
        }

        document.write("<br><br>Example of a simple pattern: Printing a hollow square of *  <br><br>");

        for (let i=1; i <= 5; i++) {
            for (let j=1; j <= 5; j++) {
                if (i === 1 || i === 5 || j === 1 || j === 5) {
                    document.write("* ");
                } else {
                    document.write("&nbsp;&nbsp;&nbsp;");
                }
            }
            document.write("<br>");
        }
    </Script>
</body>
</html>
