<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // Datatype in JavaScript

        // Number Datatype
        let num = 10;
        console.log(num);
        console.log(typeof num);

        
        // String Datatype
        let str = "Hello i am Krunal";
        console.log(str);
        console.log(typeof str);

        
        // Boolean Datatype
        let isTrue = true;
        console.log(isTrue);
        console.log(typeof isTrue);

        // Null Datatype
        let nullValue = null;
        console.log(nullValue);
        console.log(typeof nullValue); 

        // Undefined Datatype
        let user;
        console.log(user);
        console.log(typeof user);

        // Object Datatype
        let person = {
            name: "Krunal",
            age: 21
        };
        console.log(person);
        console.log(typeof person);

    </script>
</head>
<body>
    
</body>
</html>
