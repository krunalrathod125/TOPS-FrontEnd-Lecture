<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radial Gradient Example</title>
    <style>
        .main{
            height: 500px;
            width: 500px;
            background: radial-gradient(red 50%,rgb(146, 76, 76));
        }
         .main1{
            margin-top: 100px;
            height: 500px;
            width: 500px;
            background: repeating-radial-gradient(red 10%,rgb(146, 76, 76)20%);
        }
    </style>
</head>
<body>
    <div class="main"></div>
    <div class="main1"></div>
</body>
</html>
