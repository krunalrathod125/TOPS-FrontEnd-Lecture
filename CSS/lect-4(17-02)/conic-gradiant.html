<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conic Gradient Example</title>
    <style>
        .main{
            height: 500px;
            width: 500px;
            background: conic-gradient(red,yellow,green)
        }
         .main1{
            margin-top: 100px;
            height: 500px;
            width: 500px;
            background: repeating-conic-gradient(red 10%,yellow 20%,green 30%)
        }
    </style>
</head>
<body>
    <div class="main"></div>
     <div class="main1"></div>
</body>
</html>
