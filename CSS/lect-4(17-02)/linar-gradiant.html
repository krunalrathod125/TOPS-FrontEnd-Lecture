<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Gradient Example</title>
    <style>
        .main{
            height: 500px;
            width: 100%;
            /* background: linear-gradient(to right,rgb(186, 65, 65),rgb(176, 114, 114)); */
             /* background: linear-gradient(45deg,red,rgb(176, 114, 114)); */

        }
         .main1{
            margin-top: 100px;

            width: 100%;
             background: repeating-linear-gradient(red 100px,rgb(151, 83, 83)150px);
        }
    </style>
</head>

    <div class="main"></div>
    <h2>liner repeat</h2>
    <div class="main1"></div>
</body>
</html>
