<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .main{
        height: 600px;
        background: linear-gradient(to left, rgb(180, 180, 131),rgb(165, 165, 70));
        color: white;
    }
    img{
        height: 400px;
        width: 400px;
        margin-top: 100px;
        animation: imgAni ;
        animation-duration: 2s;
        animation-fill-mode: forwards;

    }
    @keyframes imgAni {
        0%{
            transform: translateX(-400px) rotate(180deg);
        }
        100%{
            transform: translateX(50px) rotate(360deg);
        }
        
    }
</style>
<body>
    <div class="main">
        <div class="img">
            <img src="img.png" alt="">
        </div>
    </div>
</body>
</html>
